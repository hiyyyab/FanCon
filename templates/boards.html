{% extends "base.html" %}

{% block content %}
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h1 style="margin:0;">Your Boards</h1>
    <a href="{{ url_for('create_board') }}"><button style="padding:9px 20px; font-size:14px;">+ New Board</button></a>
  </div>

  {% if boards %}
    <div class="card-grid">
      {% for board in boards %}
        <div class="card">
          <h3><a href="{{ url_for('board_detail', board_id=board._id) }}">{{ board.title }}</a></h3>
          <p style="color:#4A5568; font-size:14.5px; margin-bottom:10px;">{{ board.description }}</p>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="tag" style="{% if board.is_private %}background:#FEF0E8; color:#D97060;{% endif %}">
              {% if board.is_private %}Private{% else %}Public{% endif %}
            </span>
            <form method="POST" action="{{ url_for('delete_board', board_id=board._id) }}" style="margin:0;">
              <button type="submit" onclick="return confirm('Delete this board?')" style="font-size:12px; padding:5px 12px;">Delete</button>
            </form>
          </div>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <p style="color:#9CA3AF;">No boards yet.</p>
  {% endif %}
{% endblock %}
