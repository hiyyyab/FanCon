{% extends "base.html" %}

{% block content %}
  <h1>Create Group Chat</h1>

  <form method="POST">
    <label>Group Name</label>
    <input type="text" name="name" required>

    <label>Add Members (comma-separated usernames)</label>
    <input type="text" name="usernames" placeholder="e.g. alice, bob, carol" required>

    <br><br>
    <button type="submit">Create Group</button>
  </form>
{% endblock %}
