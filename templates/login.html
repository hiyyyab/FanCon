{% extends "base.html" %}

{% block content %}
  <div class="form-page">
    <h1>Login</h1>

    <form method="POST">
      <label>Email</label>
      <input type="email" name="email" required>

      <label>Password</label>
      <input type="password" name="password" required>

      <button type="submit">Log In</button>
    </form>
    <p style="margin-top:16px; font-size:14px; color:#6B7280;">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
  </div>
{% endblock %}
