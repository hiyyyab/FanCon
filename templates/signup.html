{% extends "base.html" %}

{% block content %}
  <div class="form-page">
    <h1>Sign Up</h1>

    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Password</label>
      <input type="password" name="password" required>

      <button type="submit">Create Account</button>
    </form>
    <p style="margin-top:16px; font-size:14px; color:#6B7280;">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
{% endblock %}
