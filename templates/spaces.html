{% extends "base.html" %}

{% block content %}
  <h1>Fandom Spaces</h1>

  {% if session.get('user_id') %}
    <a href="{{ url_for('create_space') }}">+ Create a Space</a>
  {% endif %}

  {% for space in spaces %}
    <div class="card">
      <h2>
        <a href="{{ url_for('space_detail', space_id=space._id) }}">
          {{ space.name }}
        </a>
      </h2>
      <p>{{ space.description }}</p>
      {% if session.get('user_id') == space.created_by|string %}
        <form method="POST" action="{{ url_for('delete_space', space_id=space._id) }}">
          <button type="submit" onclick="return confirm('Delete this space?')">Delete</button>
        </form>
      {% endif %}
    </div>
    <hr>
  {% endfor %}
{% endblock %}
